site_name: Repo Knowledge Plane
site_description: Portable, verified repo context for every coding agent
repo_url: https://github.com/seanflanagan/repo-knowledge-plane

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Concepts:
    - Claim Model: claim-model.md
    - Host Adapters: host-adapters.md
    - Security: security.md
  - Reference:
    - CLI: reference/cli.md
    - MCP Tools: reference/mcp-tools.md
    - Configuration: reference/configuration.md
  - Development:
    - Architecture: architecture.md
    - Decisions: decisions.md
    - Quality Harness: quality-harness.md
    - Contributing: contributing.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
