site_name: Repo Knowledge Plane
site_description: Extract once, govern centrally, project everywhere for AI coding agents
repo_url: https://github.com/seanflanagan/repo-knowledge-plane

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Demo: demo.md
  - Concepts:
    - Claim Model: claim-model.md
    - Host Adapters: host-adapters.md
    - Security: security.md
  - Reference:
    - CLI: reference/cli.md
    - MCP Tools: reference/mcp-tools.md
    - Configuration: reference/configuration.md
    - Distribution: distribution.md
  - Development:
    - Architecture: architecture.md
    - Development Guide: development.md
    - Testing: testing.md
    - Quality Harness: quality-harness.md
    - Contributing: contributing.md
    - Decisions: decisions.md
  - Background:
    - Historical PRD: prd.md
    - Historical Build Research: research-build.md
    - Historical Product Research: research-product.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
