name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install ".[dev]" --system

      - name: Validate release tag matches package version
        run: |
          PACKAGE_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Check changelog fragment rendering
        run: towncrier build --version "${GITHUB_REF_NAME#v}" --draft --yes > /tmp/release-notes.md

      - name: Lint
        run: |
          ruff check src tests noxfile.py
          ruff format --check src tests noxfile.py

      - name: Typecheck
        run: pyright

      - name: Test
        run: pytest tests/ -v

      - name: Quality
        run: python -m rkp.quality --fixtures tests/fixtures/ --report quality-report.json --skip-performance

      - name: Build docs
        run: mkdocs build --strict

      - name: Build package
        run: uv build

      - name: Generate SBOM
        run: |
          uv pip install "cyclonedx-bom>=4.0,<5.0" --system
          cyclonedx-py environment -o sbom.json --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
